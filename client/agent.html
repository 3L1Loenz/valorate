<!DOCTYPE html>
<html lang="en">

<head>

<title>ValoRate - VALORANT Leaderboards</title>

</head>
<body
  data-title="ValoRate - Agent Details"
  data-description="View VALORANT agent details, top players and performance overview."
  data-og-title="ValoRate - Agent Details"
  data-og-description="Explore top players and performance insights for a VALORANT agent."
  data-og-url="https://valorate.onrender.com/agent.html"
>

<div id="site-navbar"></div>

  <div class="container page-wrapper">
    <div class="page-header">
      <p>Agent overview and top player insights.</p>
    </div>

    <div class="panel">
      <div class="agent-hero">
        <img id="agentImage" class="agent-hero-image" src="" alt="" />
        <div>
          <h1 id="agentTitle">Agent</h1>
          <p id="agentSubtitle">Detailed stats and top players worldwide.</p>
        </div>
      </div>

      <div id="agentOverview" class="summary-grid"></div>

      <div class="agent-actions">
        <a id="openLeaderboardBtn" class="primary-link-btn" href="#">Open Full Leaderboard</a>
      </div>
    </div>

    <div class="panel">
      <h2>Top Players</h2>
      <div id="topPlayers"></div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script>
    const API_URL = window.location.origin;
    const params = new URLSearchParams(window.location.search);
    const agentName = params.get("name");

    function getAgentImage(name) {
      return `images/agents/${name.toLowerCase()}.png`;
    }

    function getPlayerAvatar(playerName) {
      return `images/avatars/${playerName.toLowerCase()}.png`;
    }

    function getRankDisplay(rankNumber) {
      if (rankNumber === 1) return "🥇 #1";
      if (rankNumber === 2) return "🥈 #2";
      if (rankNumber === 3) return "🥉 #3";
      return `#${rankNumber}`;
    }

    async function loadAgentPage() {
      try {
        const response = await fetch(`${API_URL}/leaderboard/${encodeURIComponent(agentName)}`);
        const data = await response.json();

        document.getElementById("agentTitle").textContent = agentName;
        document.getElementById("agentImage").src = getAgentImage(agentName);
        document.getElementById("agentImage").alt = agentName;
        document.getElementById("openLeaderboardBtn").href = `agent-leaderboard.html?agent=${encodeURIComponent(agentName)}`;
        document.getElementById("navLeaderboardLink").href = `leaderboard.html?agent=${encodeURIComponent(agentName)}`;

        if (!data.length) {
          document.getElementById("agentOverview").innerHTML = `
            <div class="empty-state">
              <h2>No data found</h2>
              <p>We don't have tracked stats for this agent yet.</p>
              <div class="empty-hint">Try Jett, Reyna, or Clove</div>
            </div>
          `;
          document.getElementById("topPlayers").innerHTML = "";
          return;
        }

        const topPlayer = [...data].sort((a, b) => a.rank - b.rank)[0];
        const averageWinRate = (data.reduce((sum, item) => sum + item.winRate, 0) / data.length).toFixed(1);
        const averageKda = (data.reduce((sum, item) => sum + item.kda, 0) / data.length).toFixed(2);
        const totalMatches = data.reduce((sum, item) => sum + item.matches, 0);

        document.getElementById("agentOverview").innerHTML = `
          <div class="summary-card">
            <span>Top Player</span>
            <strong>${topPlayer.player}</strong>
            <small>${topPlayer.region} • #1 rank</small>
          </div>

          <div class="summary-card">
            <span>Average Win Rate</span>
            <strong>${averageWinRate}%</strong>
            <small>Across tracked players</small>
          </div>

          <div class="summary-card">
            <span>Average KDA</span>
            <strong>${averageKda}</strong>
            <small>Across tracked players</small>
          </div>

          <div class="summary-card">
            <span>Total Tracked Matches</span>
            <strong>${totalMatches}</strong>
            <small>Combined from all listed players</small>
          </div>
        `;

        const topFive = [...data].sort((a, b) => a.rank - b.rank).slice(0, 5);

        document.getElementById("topPlayers").innerHTML = `
          <table>
            <tr>
              <th>Rank</th>
              <th>Player</th>
              <th>Region</th>
              <th>Win Rate</th>
              <th>KDA</th>
              <th>Matches</th>
            </tr>
            ${topFive.map(item => `
              <tr>
                <td>
                  <span class="rank-badge rank-${item.rank}">
                    ${getRankDisplay(item.rank)}
                  </span>
                </td>
                <td>
                  <a class="player-link" href="player.html?name=${encodeURIComponent(item.player)}&tag=${encodeURIComponent(item.tag || "")}">
                    ${item.player}${item.tag ? `#${item.tag}` : ""}
                  </a>
                </td>
                <td>${item.region}</td>
                <td>${item.winRate}%</td>
                <td>${item.kda}</td>
                <td>${item.matches}</td>
              </tr>
            `).join("")}
          </table>
        `;
      } catch (error) {
        document.getElementById("agentOverview").innerHTML = `
          <div class="empty-state">
            <h2>Agent page could not load</h2>
            <p>There was a problem loading this agent page.</p>
          </div>
        `;
      }
    }

    loadAgentPage();
  </script>
  <script src="/js/layout.js"></script>
</body>
</html>
