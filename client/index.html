<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ValoRate - VALORANT Leaderboards</title>

  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="style.css" />

  <meta name="description" content="ValoRate - Global VALORANT leaderboards, player stats and agent rankings." />

  <meta property="og:title" content="ValoRate - VALORANT Leaderboards" />
  <meta property="og:description" content="Explore global VALORANT leaderboards, compare players and view agent rankings." />
  <meta property="og:image" content="https://valorate.onrender.com/images/social-preview.png" />
  <meta property="og:url" content="https://valorate.onrender.com/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="ValoRate" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ValoRate - VALORANT Leaderboards" />
  <meta name="twitter:description" content="Explore global VALORANT leaderboards and player stats." />
  <meta name="twitter:image" content="https://valorate.onrender.com/images/social-preview.png" />
</head>
<body>
  <header class="topbar">
  <div class="topbar-inner">

    <a href="index.html" class="brand">
      <img src="images/valorate-logo.png" class="brand-logo">
    </a>

    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="agents.html">Agents</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="compare.html">Compare</a>
    </nav>
    <div id="userMenu" class="user-menu" style="display:none;">
  <button class="user-menu-btn" onclick="toggleUserMenu()">
    <span id="userMenuName"></span> ▼
  </button>

  <div id="userDropdown" class="user-dropdown">
    <a id="userProfileLink">My Profile</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a onclick="logoutPlayer()">Logout</a>
  </div>
</div>

    <a href="#searchSection" class="search-cta">Search Player</a>

  </div>
</header>

<div class="landing-shell">
  <section class="hero-screen">
    <div class="background-noise"></div>
    <div class="background-red-glow"></div>

    <div class="hero-logo-wrap">
      <img src="images/valorate-logo.png" alt="ValoRate Logo" class="hero-logo" />
    </div>

    <div class="hero-search" id="searchSection">

  <div class="search-box landing-search-box">
  <select id="regionInput">
    <option value="eu">EU</option>
    <option value="na">NA</option>
    <option value="ap">AP</option>
    <option value="kr">KR</option>
    <option value="latam">LATAM</option>
    <option value="br">BR</option>
  </select>

  <input type="text" id="playerInput" placeholder="Enter Riot ID (example: Ace#EU1)" />
  <button onclick="searchPlayer()">Search Player</button>
</div>

<div id="autocompleteBox" class="autocomplete-box"></div>

<div id="recentSearchesBox" class="recent-searches-box">
  <h3>Recent Searches</h3>
  <div id="recentSearchesList" class="recent-searches-list"></div>
</div>

<div class="panel my-rank-panel" id="myRankPanel">
  <div id="authState">
    <h2>My Ranking</h2>
    <p>Sign in with your Riot ID to view your personal ranking overview.</p>

    <div class="login-form">
      <input type="text" id="loginRiotId" placeholder="Enter Riot ID (example: Ace#EU1)" />
      <button onclick="loginPlayer()">Sign In</button>
    </div>
  </div>

  <div id="loggedInState" style="display:none;"></div>
</div>
  </section>
 

  
</div>
 
  </footer>

  <script src="script.js"></script>
</body>
</html>
