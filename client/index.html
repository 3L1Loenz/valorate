<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ValoRate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
  <div class="topbar-inner">

    <a href="index.html" class="brand">
      <img src="images/valorate-logo.png" class="brand-logo">
    </a>

    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="agents.html">Agents</a>
      <a href="leaderboard.html?agent=Jett">Leaderboard</a>
      <a href="compare.html">Compare</a>
    </nav>

    <a href="#searchSection" class="search-cta">Search Player</a>

  </div>
</header>

<div class="landing-shell">
  <section class="hero-screen">
    <div class="background-noise"></div>
    <div class="background-red-glow"></div>

    <div class="hero-logo-wrap">
      <img src="images/valorate-logo.png" alt="ValoRate Logo" class="hero-logo" />
    </div>

    <div class="hero-search" id="searchSection">
      <div class="search-box landing-search-box">
        <input type="text" id="playerInput" placeholder="Enter Riot ID (example: Ace#EU1)" />
        <button onclick="searchPlayer()">Search Player</button>
      </div>

      <div id="autocompleteBox" class="autocomplete-box"></div>

      <div id="recentSearchesBox" class="recent-searches-box">
        <h3>Recent Searches</h3>
        <div id="recentSearchesList" class="recent-searches-list"></div>
      </div>
    </div>
  </section>

  
</div>
 
  </footer>

  <script src="script.js"></script>
</body>
</html>
